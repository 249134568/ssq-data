<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8343e"/>
      <stop offset="100%" style="stop-color:#1a78ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Red balls -->
  <circle cx="260" cy="340" r="80" fill="#e8343e" filter="url(#shadow)"/>
  <text x="260" y="370" text-anchor="middle" fill="white" font-size="60" font-weight="bold" font-family="Arial">03</text>
  <circle cx="440" cy="340" r="80" fill="#e8343e" filter="url(#shadow)"/>
  <text x="440" y="370" text-anchor="middle" fill="white" font-size="60" font-weight="bold" font-family="Arial">05</text>
  <circle cx="620" cy="340" r="80" fill="#e8343e" filter="url(#shadow)"/>
  <text x="620" y="370" text-anchor="middle" fill="white" font-size="60" font-weight="bold" font-family="Arial">16</text>
  <circle cx="260" cy="560" r="80" fill="#e8343e" filter="url(#shadow)"/>
  <text x="260" y="590" text-anchor="middle" fill="white" font-size="60" font-weight="bold" font-family="Arial">18</text>
  <circle cx="440" cy="560" r="80" fill="#e8343e" filter="url(#shadow)"/>
  <text x="440" y="590" text-anchor="middle" fill="white" font-size="60" font-weight="bold" font-family="Arial">29</text>
  <circle cx="620" cy="560" r="80" fill="#e8343e" filter="url(#shadow)"/>
  <text x="620" y="590" text-anchor="middle" fill="white" font-size="60" font-weight="bold" font-family="Arial">32</text>
  <!-- Blue ball -->
  <circle cx="780" cy="450" r="80" fill="#1a78ff" filter="url(#shadow)"/>
  <text x="780" y="480" text-anchor="middle" fill="white" font-size="60" font-weight="bold" font-family="Arial">04</text>
</svg>
