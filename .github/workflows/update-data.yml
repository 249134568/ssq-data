name: Update Lottery Data

on:
  schedule:
    # Draw days (Sun/Tue/Thu): every 5 min from 21:25 to 22:55 CST (UTC+8 = 13:25-14:55 UTC)
    - cron: '25,30,35,40,45,50,55 13 * * 0,2,4'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 14 * * 0,2,4'
    # Non-draw: every 4 hours
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest data
        run: node scripts/fetch-data.js
        env:
          SSQ_DATA_FILE: data.json

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: update lottery data $(date -u +%Y-%m-%d-%H%M)"
          git push
